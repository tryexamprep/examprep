      <!-- FAQ -->
      <section class="faq" id="faq">
        <div class="container">
          <h2 class="section-title">שאלות נפוצות</h2>
          <div class="faq-list">
            <details class="faq-item">
              <summary>איך עובד עיבוד ה-PDF?</summary>
              <p>המערכת חותכת אוטומטית כל שאלה מהקובץ שלך לתמונה נפרדת, ומזהה את התשובה הנכונה לפי הסימונים בקובץ הפתרונות (סימונים בצהוב). התהליך לוקח כמה שניות לקובץ.</p>
            </details>
            <details class="faq-item">
              <summary>אילו סוגי מבחנים נתמכים?</summary>
              <p>כל מבחן בעברית או באנגלית עם שאלות אמריקאיות (multiple choice). תומכים בקבצים מהאוניברסיטה (תל אביב, העברית, טכניון, בן-גוריון, חיפה, ב"א ועוד), פסיכומטרי, AMIRAM, מבחני בגרות וכל מבחן אחר.</p>
            </details>
            <details class="faq-item">
              <summary>כמה זמן לוקח לעבד קובץ?</summary>
              <p>בממוצע 10-30 שניות לקובץ של 20 עמודים. קבצים גדולים יותר (עד 100 עמודים) יכולים לקחת עד דקה.</p>
            </details>
            <details class="faq-item">
              <summary>איך עובד ניתוח דפוסי המרצה?</summary>
              <p>אחרי שהעלית כמה מבחנים, ה-AI סורק את כולם ומזהה דפוסים: באילו נושאים המרצה מתמקד, אילו סוגי שאלות חוזרים, ומה הסטייה הסטטיסטית. מקבל המלצות ממוקדות.</p>
            </details>
            <details class="faq-item">
              <summary>מה זה "שאלות AI דומות"?</summary>
              <p>אחרי שיש לך מאגר שאלות, ה-AI מייצר שאלות חדשות באותו סגנון - אותה רמת קושי, אותם נושאים, אותה צורת ניסוח. תרגול בלתי מוגבל בלי שאוזלות לך השאלות.</p>
            </details>
            <details class="faq-item">
              <summary>האם המידע שלי פרטי?</summary>
              <p>כן בהחלט. אנחנו מצפינים את כל הקבצים שלך, ורק אתה יכול לגשת אליהם. אנחנו תואמים תקנות הגנת הפרטיות (תשע"ז-2017), GDPR, ולא משתפים נתונים עם צד שלישי.</p>
            </details>
            <details class="faq-item">
              <summary>אפשר לבטל בכל עת?</summary>
              <p>כן - אפשר לבטל מנוי בכל עת מהדשבורד. תמשיך לקבל את השירות עד סוף תקופת החיוב הנוכחית.</p>
            </details>
            <details class="faq-item">
              <summary>איך מתבצע התשלום?</summary>
              <p>תשלום מאובטח דרך Stripe (כרטיסי אשראי) או דרך ספקי תשלום ישראליים (Tranzila). הנתונים שלך לעולם לא נשמרים אצלנו.</p>
            </details>
          </div>
        </div>
