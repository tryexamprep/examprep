  <div class="cookie-banner" id="cookie-banner" role="dialog" aria-label="הסכמת עוגיות" hidden>

      <p>אתר זה משתמש בעוגיות חיוניות בלבד לצורך פעולה תקינה. <a href="/legal/cookies.html">מדיניות עוגיות</a></p>
      <button class="btn btn-primary btn-sm" id="cookie-accept">הבנתי</button>
    </div>
  </div>
  <script>
    (function() {
      if (!localStorage.getItem('cookie-consent')) {
        var b = document.getElementById('cookie-banner');
        if (b) b.hidden = false;
        document.getElementById('cookie-accept').addEventListener('click', function() {
          localStorage.setItem('cookie-consent', '1');
          b.hidden = true;
        });
      }
    })();
  </script>
